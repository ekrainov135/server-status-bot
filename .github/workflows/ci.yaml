name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format (pre-commit stage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: "Run pre-commit (stage: pre-commit)"
        run: pre-commit run --all-files --hook-stage pre-commit

  test:
    name: Type check & tests (pre-push stage)
    runs-on: ubuntu-latest
    needs: lint
    env:
      BOT_TOKEN: 'ci-placeholder-token'
      ADMINS: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: "Run pre-commit (stage: pre-push)"
        run: pre-commit run --all-files --hook-stage pre-push